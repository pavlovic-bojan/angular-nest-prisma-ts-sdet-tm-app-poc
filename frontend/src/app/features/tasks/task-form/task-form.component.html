<form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4" data-testid="task-form" novalidate>
  <div>
    <label for="task-title" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Title *</label>
    <input
      id="task-title"
      type="text"
      formControlName="title"
      data-testid="task-title"
      class="w-full px-4 py-2 border border-slate-300 dark:border-slate-600 dark:bg-slate-800 dark:text-white rounded-lg focus:ring-2 focus:ring-slate-500"
    />
    @if (form.get('title')?.invalid && form.get('title')?.touched) {
      <p class="text-red-500 text-xs mt-1" role="alert">Title is required</p>
    }
  </div>

  <div>
    <label for="task-description " class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Description</label>
    <textarea
      id="task-description"
      formControlName="description"
      data-testid="task-description"
      rows="3"
      class="w-full px-4 py-2 border border-slate-300 dark:border-slate-600 dark:bg-slate-800 dark:text-white rounded-lg focus:ring-2 focus:ring-slate-500"
    ></textarea>
  </div>

  <div class="grid grid-cols-2 gap-4">
    <div>
      <label for="task-status" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Status *</label>
      <select
        id="task-status"
        formControlName="status"
        data-testid="task-status"
        class="w-full px-4 py-2 border border-slate-300 dark:border-slate-600 dark:bg-slate-800 dark:text-white rounded-lg focus:ring-2 focus:ring-slate-500"
      >
        <option value="todo">To Do</option>
        <option value="in-progress">In Progress</option>
        <option value="done">Done</option>
      </select>
    </div>
    <div>
      <label for="task-priority" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Priority *</label>
      <select
        id="task-priority"
        formControlName="priority"
        data-testid="task-priority"
        class="w-full px-4 py-2 border border-slate-300 dark:border-slate-600 dark:bg-slate-800 dark:text-white rounded-lg focus:ring-2 focus:ring-slate-500"
      >
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select>
    </div>
  </div>

  <div class="grid grid-cols-2 gap-4">
    <div>
      <label for="task-project" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Project *</label>
      <select
        id="task-project"
        formControlName="projectId"
        data-testid="task-project"
        class="w-full px-4 py-2 border border-slate-300 dark:border-slate-600 dark:bg-slate-800 dark:text-white rounded-lg focus:ring-2 focus:ring-slate-500"
      >
        @for (p of projects(); track p.id) {
          <option [value]="p.id">{{ p.name }}</option>
        }
      </select>
    </div>
    <div>
      <label for="task-assignee" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Assignee</label>
      <select
        id="task-assignee"
        formControlName="assigneeId"
        data-testid="task-assignee"
        class="w-full px-4 py-2 border border-slate-300 dark:border-slate-600 dark:bg-slate-800 dark:text-white rounded-lg focus:ring-2 focus:ring-slate-500"
      >
        <option value="">None</option>
        @for (u of users(); track u.id) {
          <option [value]="u.id">{{ u.name }}</option>
        }
      </select>
    </div>
  </div>

  <div class="flex gap-3 pt-4">
    <button
      type="submit"
      [disabled]="form.invalid"
      data-testid="task-form-submit"
      class="px-4 py-2 bg-slate-800 dark:bg-slate-700 text-white rounded-lg hover:bg-slate-700 dark:hover:bg-slate-600 disabled:opacity-50 disabled:cursor-not-allowed transition"
    >
      {{ isEdit ? 'Update' : 'Create' }}
    </button>
    <button
      type="button"
      (click)="closed.emit()"
      data-testid="task-form-cancel"
      class="px-4 py-2 border border-slate-300 dark:border-slate-600 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 dark:text-slate-200 transition"
    >
      Cancel
    </button>
  </div>
</form>
