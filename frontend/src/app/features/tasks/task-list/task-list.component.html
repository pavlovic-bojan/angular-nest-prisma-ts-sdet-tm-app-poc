<div class="flex justify-between items-center mb-4 md:mb-6 gap-2 flex-wrap">
  <h2 class="text-xl md:text-2xl font-bold text-slate-800 dark:text-white" data-testid="page-heading">Tasks</h2>
  <button
    data-testid="add-task-btn"
    (click)="openDrawer(null)"
    class="px-4 py-2 bg-slate-800 dark:bg-slate-700 text-white rounded-lg hover:bg-slate-700 dark:hover:bg-slate-600 transition"
  >
    Add Task
  </button>
</div>

<div class="bg-white dark:bg-slate-900 rounded-xl shadow overflow-hidden border border-slate-200 dark:border-slate-700">
  <div class="overflow-x-auto md:overflow-x-visible">
    <table class="w-full min-w-max" data-testid="tasks-table">
      <thead class="bg-slate-100 dark:bg-slate-800 text-xs md:text-sm">
        <tr>
          <th class="px-4 py-3 text-left">
            <button (click)="sortBy('title')" class="flex items-center gap-1 text-sm font-medium text-slate-700 hover:text-slate-900 dark:text-slate-300 dark:hover:text-white">
              Title
              @if (sortColumn() === 'title') { <span>{{ sortDirection() === 'asc' ? '↑' : '↓' }}</span> }
            </button>
          </th>
          <th class="px-4 py-3 text-left">
            <button (click)="sortBy('status')" class="flex items-center gap-1 text-sm font-medium text-slate-700 hover:text-slate-900 dark:text-slate-300 dark:hover:text-white">
              Status
              @if (sortColumn() === 'status') { <span>{{ sortDirection() === 'asc' ? '↑' : '↓' }}</span> }
            </button>
          </th>
          <th class="px-4 py-3 text-left">
            <button (click)="sortBy('priority')" class="flex items-center gap-1 text-sm font-medium text-slate-700 hover:text-slate-900 dark:text-slate-300 dark:hover:text-white">
              Priority
              @if (sortColumn() === 'priority') { <span>{{ sortDirection() === 'asc' ? '↑' : '↓' }}</span> }
            </button>
          </th>
          <th class="px-4 py-3 text-left">
            <button (click)="sortBy('projectId')" class="flex items-center gap-1 text-sm font-medium text-slate-700 hover:text-slate-900 dark:text-slate-300 dark:hover:text-white">
              Project
              @if (sortColumn() === 'projectId') { <span>{{ sortDirection() === 'asc' ? '↑' : '↓' }}</span> }
            </button>
          </th>
          <th class="px-4 py-3 text-left">
            <button (click)="sortBy('updatedAt')" class="flex items-center gap-1 text-sm font-medium text-slate-700 hover:text-slate-900 dark:text-slate-300 dark:hover:text-white">
              Updated
              @if (sortColumn() === 'updatedAt') { <span>{{ sortDirection() === 'asc' ? '↑' : '↓' }}</span> }
            </button>
          </th>
          <th class="px-4 py-3 text-right text-sm font-medium text-slate-700 dark:text-slate-300">Actions</th>
        </tr>
      </thead>
      <tbody>
        @for (task of paginatedTasks(); track task.id) {
          <tr
            class="border-t border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800/50"
            [attr.data-testid]="'task-row-' + task.id"
          >
            <td class="px-4 py-3 text-slate-900 dark:text-slate-100">{{ task.title }}</td>
            <td class="px-4 py-3">
              <span class="px-2 py-1 rounded text-xs font-medium" [class]="getStatusClass(task.status)">
                {{ task.status | statusLabel }}
              </span>
            </td>
            <td class="px-4 py-3 text-slate-700 dark:text-slate-300">{{ task.priority | statusLabel }}</td>
            <td class="px-4 py-3 text-slate-700 dark:text-slate-300">{{ getProjectName(task.projectId) }}</td>
            <td class="px-4 py-3 text-slate-700 dark:text-slate-300">{{ task.updatedAt | dateFormat }}</td>
            <td class="px-4 py-3 text-right">
              <div class="flex justify-end gap-2">
                <button
                  (click)="openDrawer(task.id)"
                  [attr.data-testid]="'task-edit-' + task.id"
                  class="p-1.5 text-slate-600 hover:text-slate-800 hover:bg-slate-100 dark:hover:bg-slate-700 rounded transition"
                  title="Edit task"
                  aria-label="Edit task"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z" />
                  </svg>
                </button>
                <button
                  (click)="openDeleteConfirm(task.id, task.title)"
                  [attr.data-testid]="'task-delete-' + task.id"
                  class="p-1.5 text-red-600 hover:text-red-700 hover:bg-red-50 dark:hover:bg-red-900/20 rounded transition"
                  title="Delete task"
                  aria-label="Delete task"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
                  </svg>
                </button>
              </div>
            </td>
          </tr>
        } @empty {
          <tr>
            <td colspan="6" class="px-4 py-8 text-center text-slate-500" data-testid="tasks-empty">
              No tasks yet
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>

  @if (tasks().length > 0) {
    <app-table-pagination
      [totalItems]="sortedTasks().length"
      [currentPage]="currentPage()"
      [pageSize]="pageSize()"
      (pageChange)="currentPage.set($event)"
      (pageSizeChange)="onPageSizeChange($event)"
    />
  }
</div>

<app-drawer
  [open]="drawerOpen"
  [title]="editingTaskId ? 'Edit Task' : 'New Task'"
  (close)="closeDrawer()"
>
  <app-task-form [taskId]="editingTaskId" (closed)="closeDrawer()" />
</app-drawer>

<app-confirm-dialog
  [open]="deleteDialogOpen"
  title="Delete task"
  [message]="deleteConfirmMessage()"
  (confirm)="confirmDelete()"
  (cancel)="closeDeleteConfirm()"
/>
