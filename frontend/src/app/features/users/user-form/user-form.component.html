<form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4" data-testid="user-form" novalidate>
  <div>
    <label for="user-name" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Name *</label>
    <input
      id="user-name"
      type="text"
      formControlName="name"
      data-testid="user-name"
      autocomplete="name"
      class="w-full px-4 py-2 border border-slate-300 dark:border-slate-600 dark:bg-slate-800 dark:text-white rounded-lg focus:ring-2 focus:ring-slate-500"
    />
    @if (form.get('name')?.invalid && form.get('name')?.touched) {
      <p class="text-red-500 text-xs mt-1" role="alert">Name is required</p>
    }
  </div>

  <div>
    <label for="user-email" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Email *</label>
    <input
      id="user-email"
      type="email"
      formControlName="email"
      data-testid="user-email"
      autocomplete="email"
      class="w-full px-4 py-2 border border-slate-300 dark:border-slate-600 dark:bg-slate-800 dark:text-white rounded-lg focus:ring-2 focus:ring-slate-500"
    />
    @if (form.get('email')?.invalid && form.get('email')?.touched) {
      <p class="text-red-500 text-xs mt-1" role="alert">Valid email is required</p>
    }
  </div>

  <div>
    <label for="user-role" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Role *</label>
    <input
      id="user-role"
      type="text"
      formControlName="role"
      data-testid="user-role"
      placeholder="admin, developer, etc."
      class="w-full px-4 py-2 border border-slate-300 dark:border-slate-600 dark:bg-slate-800 dark:text-white rounded-lg focus:ring-2 focus:ring-slate-500"
    />
    @if (form.get('role')?.invalid && form.get('role')?.touched) {
      <p class="text-red-500 text-xs mt-1" role="alert">Role is required</p>
    }
  </div>

  <div class="flex gap-3 pt-4">
    <button
      type="submit"
      [disabled]="form.invalid"
      data-testid="user-form-submit"
      class="px-4 py-2 bg-slate-800 dark:bg-slate-700 text-white rounded-lg hover:bg-slate-700 dark:hover:bg-slate-600 disabled:opacity-50 disabled:cursor-not-allowed transition"
    >
      {{ isEdit ? 'Update' : 'Create' }}
    </button>
    <button
      type="button"
      (click)="closed.emit()"
      data-testid="user-form-cancel"
      class="px-4 py-2 border border-slate-300 dark:border-slate-600 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 dark:text-slate-200 transition"
    >
      Cancel
    </button>
  </div>
</form>
