<form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4" data-testid="project-form" novalidate>
  <div>
    <label for="project-name" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Name *</label>
    <input
      id="project-name"
      type="text"
      formControlName="name"
      data-testid="project-name"
      class="w-full px-4 py-2 border border-slate-300 dark:border-slate-600 dark:bg-slate-800 dark:text-white rounded-lg focus:ring-2 focus:ring-slate-500"
    />
    @if (form.get('name')?.invalid && form.get('name')?.touched) {
      <p class="text-red-500 text-xs mt-1" role="alert">Name is required</p>
    }
  </div>

  <div>
    <label for="project-description" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Description</label>
    <textarea
      id="project-description"
      formControlName="description"
      data-testid="project-description"
      rows="3"
      class="w-full px-4 py-2 border border-slate-300 dark:border-slate-600 dark:bg-slate-800 dark:text-white rounded-lg focus:ring-2 focus:ring-slate-500"
    ></textarea>
  </div>

  <div class="flex gap-3 pt-4">
    <button
      type="submit"
      [disabled]="form.invalid"
      data-testid="project-form-submit"
      class="px-4 py-2 bg-slate-800 dark:bg-slate-700 text-white rounded-lg hover:bg-slate-700 dark:hover:bg-slate-600 disabled:opacity-50 disabled:cursor-not-allowed transition"
    >
      {{ isEdit ? 'Update' : 'Create' }}
    </button>
    <button
      type="button"
      (click)="closed.emit()"
      data-testid="project-form-cancel"
      class="px-4 py-2 border border-slate-300 dark:border-slate-600 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 dark:text-slate-200 transition"
    >
      Cancel
    </button>
  </div>
</form>
