name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run migrations
        env:
          DATABASE_URL: "file:./prisma/dev.db"
        run: npx prisma migrate deploy

      - name: Seed database
        env:
          DATABASE_URL: "file:./prisma/dev.db"
        run: npx prisma db seed

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: E2E tests
        env:
          DATABASE_URL: "file:./prisma/dev.db"
          JWT_SECRET: "ci-test-secret-not-for-production"
        run: npm run test:e2e

      - name: Build
        run: npm run build

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Test
        run: npm test -- --no-watch --browsers=ChromeHeadless

      - name: Build
        run: npm run build

  e2e:
    name: E2E (API + UI)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            tests/package-lock.json

      - name: Install backend
        run: npm ci
        working-directory: backend

      - name: Generate Prisma & migrate
        working-directory: backend
        env:
          DATABASE_URL: "file:./prisma/dev.db"
        run: |
          npx prisma generate
          npx prisma migrate deploy
          npx prisma db seed

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Install frontend
        run: npm ci
        working-directory: frontend

      - name: Install tests
        run: npm ci
        working-directory: tests

      - name: Install Playwright
        run: npx playwright install --with-deps chromium
        working-directory: tests

      - name: Start backend
        working-directory: backend
        env:
          DATABASE_URL: "file:./prisma/dev.db"
          PORT: "3000"
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret-not-for-production' }}
        run: npm run start:prod &

      - name: Start frontend
        working-directory: frontend
        run: npm run start &
        env:
          NG_CLI_ANALYTICS: "false"

      - name: Wait for services
        run: |
          echo "Waiting for backend..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Backend ready after ${i}s"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "ERROR: Backend did not start within 60s"
              exit 1
            fi
            sleep 2
          done
          echo "Waiting for frontend..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4200 > /dev/null 2>&1; then
              echo "Frontend ready after ${i}s"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "ERROR: Frontend did not start within 60s"
              exit 1
            fi
            sleep 2
          done

      - name: Run API tests
        working-directory: tests
        env:
          API_BASE_URL: "http://localhost:3000"
        run: npm run test:api

      - name: Run UI tests
        working-directory: tests
        env:
          BASE_URL: "http://localhost:4200"
        run: npm run test:ui

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            tests/allure-results
            tests/output
          retention-days: 7
          if-no-files-found: ignore

      - name: Install Allure CLI
        if: always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/2.24.1/allure-2.24.1.tgz
          tar -zxf allure-2.24.1.tgz
          sudo mv allure-2.24.1 /opt/allure
          sudo ln -sf /opt/allure/bin/allure /usr/local/bin/allure

      - name: Generate Allure report
        if: always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          if [ -d "tests/allure-results" ] && [ "$(ls -A tests/allure-results 2>/dev/null)" ]; then
            allure generate tests/allure-results --clean -o allure-report
          else
            mkdir -p allure-report
            echo '<!DOCTYPE html><html><head><title>No Allure Results</title></head><body><h1>No E2E results</h1><p>Tests did not produce Allure output.</p></body></html>' > allure-report/index.html
          fi

      - name: Prepare GitHub Pages content
        if: always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          mkdir -p gh-pages-content
          git fetch origin gh-pages 2>/dev/null || true
          if git rev-parse origin/gh-pages >/dev/null 2>&1; then
            git archive origin/gh-pages 2>/dev/null | tar -x -C gh-pages-content 2>/dev/null || true
          fi
          mkdir -p gh-pages-content/allure gh-pages-content/load
          cp -r allure-report/* gh-pages-content/allure/
          if [ ! -f gh-pages-content/load/index.html ]; then
            echo '<!DOCTYPE html><html><body><h1>No load test results</h1><p>Run Performance workflow.</p></body></html>' > gh-pages-content/load/index.html
          fi
          cp .github/pages-index.html gh-pages-content/index.html

      - name: Deploy to GitHub Pages
        if: always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-content
          publish_branch: gh-pages
          force_orphan: true
